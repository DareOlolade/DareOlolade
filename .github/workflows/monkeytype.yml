name: Update Monkeytype Stats
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Monkeytype SVG
        uses: ridemountainpig/monkeytype-readme@master
        with:
          # Use 'username' instead of 'monkeytype_username'
          username: DareOlolade 
          # Use 'api_key' and explicitly provide the 'github-token'
          api_key: ${{ secrets.MONKEYTYPE_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }} 
